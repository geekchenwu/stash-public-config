  type: vless
  server: placeholder.invalid
  port: 443
  uuid: 00000000-0000-0000-0000-000000000000
  network: tcp
  udp: true
  tls: true
  flow: xtls-rprx-vision
  servername: www.tesla.com
  client-fingerprint: chrome
  reality-opts:
    public-key: AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA
    short-id: '00000000'
  alterId: 0
  cipher: ''
  sni: www.tesla.com
